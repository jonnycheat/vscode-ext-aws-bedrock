name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Type-check
        run: npm run compile
      - name: Test
        run: npm test
      - name: Build
        run: npm run build
      - name: Package
        run: npm run package
      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high
